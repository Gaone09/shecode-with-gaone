<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="playGame('rock'); ">Rock</button>

    <button onclick="playGame('paper');">Paper</button>

    <button onclick=" playGame('scissors')">scissors</button>
    <button
      onclick="
    score.wins = 0;
    score.loses = 0;
    score.tires = 0;
    localStorage.removeItem('score');
    "
    >
      Reset Button
    </button>

    <script>
      const score = JSON.parse(localStorage.getItem("score"));
      //console.log(JSON.parse(localStorage.getItem('score')));
      if (score === null) {
        //shortcut
        score = {
          //default operator
          wins: 0, // let JSON.parse(localStorage.getItem('score')) || { win :}
          loses: 0,
          ties: 0,
        };
        /*
if(!score) {
  score = {
    wins: 0,
    loses: 0,
    ties: 0
  };
  */
      }

      function playGame(PlayerMove) {
        const computerMove = pickComputerMove();

        let result = "";
        if (PlayerMove === "scissors") {
          if (computerMove === "rock") {
            result = "you lose";
          } else if (computerMove === "paper") {
            result = "you win";
          } else if (computerMove === "scissors") {
            result = "Tie";
          }
        } else if (PlayerMove === "paper") {
          if (computerMove === "rock") {
            result = "you win";
          } else if (computerMove === "paper") {
            result = "tie";
          } else if (computerMove === "scissors") {
            result = "You lose";
          }
        } else if (PlayerMove === "rock") {
          if (computerMove === "rock") {
            result = "Tie";
          } else if (computerMove === "paper") {
            result = "you lose";
          } else if (computerMove === "scissors") {
            result = "You win ";
          }
        }
        if (result === "you win") {
          score.wins += 1;
        } else if (result === "you lose") {
          score.loses += 1;
        } else if (result === "Tie") {
          score.ties += 1;
        }
        localStorage.setItem("score", JSON.stringify(score));

        alert(
          `You picked ${PlayerMove}.Computer picked  ${computerMove}. ${result}
          Wins: ${score.wins}, Losses: ${score.loses}, Ties: ${score.ties}`
        );
      }
      function pickComputerMove() {
        const randomNumber = Math.random();
        let computerMove = "";

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "Paper";
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = "scissors";
        }

        return computerMove; // return statement lets us get a value out of a function, this a returning a value from a function
      }
    </script>
  </body>
</html>
